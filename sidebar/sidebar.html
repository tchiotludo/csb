<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Launch Sidebar</title>
    <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
    <div class="sidebar">
        <div id="empty-state" class="empty-state">
            <div class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                </svg>
            </div>
            <h2>Quick Launch</h2>
            <p>Press <kbd>Ctrl+Space</kbd> on any page, search for a URL, and press <kbd>Enter</kbd> to open it here.</p>
        </div>

        <iframe id="frame" class="frame" hidden></iframe>
        <button id="open-tab-btn" class="open-tab-btn" hidden title="Open in new tab">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                <polyline points="15 3 21 3 21 9" />
                <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
        </button>
    </div>

    <script src="sidebar.js"></script>
</body>
</html>
