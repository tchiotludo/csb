<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#1e0a4a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Main window -->
  <rect x="16" y="24" width="96" height="80" rx="10"
        fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Sidebar panel (right third) -->
  <rect x="82" y="24" width="30" height="80" rx="10"
        fill="url(#panel)"/>
  <rect x="82" y="24" width="30" height="80"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Divider accent line -->
  <rect x="80" y="30" width="2.5" height="68" rx="1.25" fill="url(#divider)"/>
</svg>
