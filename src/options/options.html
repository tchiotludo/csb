<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSB — Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <div>
        <h1 class="header-title">CSB</h1>
        <p class="header-sub">Press <kbd>Ctrl+Space</kbd> on any page to open the launcher</p>
      </div>
    </header>

    <main class="main">
      <section class="add-section">
        <h2 class="section-title">Add URL</h2>
        <form id="add-form" class="add-form" autocomplete="off">
          <div class="field-group">
            <div class="field">
              <label class="label" for="input-url">URL <span class="optional">(%s for search)</span></label>
              <input id="input-url" class="input" type="text" placeholder="https://example.com/search?q=%s" required />
            </div>
            <div class="field">
              <label class="label" for="input-title">Title <span class="optional">(optional)</span></label>
              <input id="input-title" class="input" type="text" placeholder="My site" />
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-add" id="btn-add">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add URL
            </button>
            <button type="button" class="btn-cancel" id="btn-cancel" hidden>Cancel</button>
          </div>
        </form>
        <div id="status-msg" class="status-msg" hidden></div>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2 class="section-title">Saved URLs</h2>
          <span class="count-badge" id="count-badge">0</span>
        </div>
        <div id="url-list" class="url-list">
          <div class="empty-list">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <p>No URLs yet. Add your first one above.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
